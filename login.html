<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — BookLink</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="logo-area">
      <span class="logo-dot"></span>
      <a class="site-name" href="index.html" style="text-decoration:none;color:inherit;">BookLink</a>
    </div>
  </header>

  <div class="form-page">
    <div class="form-box">

      <h2>Welcome back</h2>
      <p class="subtitle">Log in to manage your bookings.</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="sara@email.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Your password">
      </div>

      <button class="btn-full" type="button" onclick="window.location.href='dashboard.html'">
        Log In
      </button>

      <p class="form-footer">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </p>

    </div>
  </div>

</body>
</html>
