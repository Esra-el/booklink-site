<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check your inbox — BookLink</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="logo-area">
      <span class="logo-dot"></span>
      <a class="site-name" href="index.html" style="text-decoration:none;color:inherit;">BookLink</a>
    </div>
  </header>

  <!-- Centered message confirming email was sent -->
  <div class="form-page">
    <div class="form-box" style="text-align:center;">

      <!-- Big emoji as icon -->
      <div style="font-size:3rem; margin-bottom:16px;">📬</div>

      <h2>Check your inbox!</h2>
      <p class="subtitle">
        We sent a verification email to your address.<br>
        Click the link in the email to activate your account.
      </p>

      <p style="color:#6b7280; font-size:0.85rem; margin-top:20px;">
        Didn't receive it? Check your spam folder or 
        <a href="#" style="color:#4f46e5;">resend the email</a>.
      </p>

    </div>
  </div>

</body>
</html>
